<!DOCTYPE html>
<html>
<head>
  <title>Jeep Preview</title>
  <style>
    body { background: #1a1a2e; display: flex; gap: 60px; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
    .panel { text-align: center; }
    canvas { display: block; border: 1px solid #444; background: #3a5c2a; }
    p { color: #ccc; margin: 8px 0 0; font-size: 13px; }
  </style>
</head>
<body>

<div class="panel">
  <canvas id="current" width="160" height="90"></canvas>
  <p>Current</p>
</div>
<div class="panel">
  <canvas id="wrangler" width="160" height="90"></canvas>
  <p>Wrangler</p>
</div>
<div class="panel">
  <canvas id="reference" width="160" height="90"></canvas>
  <p>Wrangler (ref)</p>
</div>

<script>
const JW = 90, JH = 44;

// ── Current jeep ──────────────────────────────────────────────────────────────
(function () {
  const ctx = document.getElementById("current").getContext("2d");
  ctx.scale(1.6, 1.6);
  ctx.translate(10, 10);

  const wheelY = JH - 8;
  [20, JW - 20].forEach(wx => {
    ctx.fillStyle = "#222";
    ctx.beginPath(); ctx.arc(wx, wheelY, 12, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#555"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(wx, wheelY, 12, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = "#666"; ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const a = i * Math.PI / 2;
      ctx.beginPath(); ctx.moveTo(wx, wheelY); ctx.lineTo(wx + Math.cos(a) * 10, wheelY + Math.sin(a) * 10); ctx.stroke();
    }
    ctx.fillStyle = "#444"; ctx.beginPath(); ctx.arc(wx, wheelY, 4, 0, Math.PI * 2); ctx.fill();
  });

  ctx.fillStyle = "#4a6630";
  ctx.fillRect(0, JH - 26, JW, 20);
  ctx.fillStyle = "#3d5528";
  ctx.fillRect(12, JH - 46, JW - 22, 24);
  ctx.fillStyle = "rgba(150,220,255,0.3)";
  ctx.fillRect(JW - 30, JH - 44, 18, 18);
  ctx.strokeStyle = "#555"; ctx.lineWidth = 1;
  ctx.strokeRect(JW - 30, JH - 44, 18, 18);
  ctx.fillStyle = "#3a4f22";
  ctx.fillRect(0, JH - 30, 8, 20);
  ctx.fillRect(JW - 8, JH - 30, 8, 20);
})();

// ── Wrangler jeep ─────────────────────────────────────────────────────────────
(function () {
  const ctx = document.getElementById("wrangler").getContext("2d");
  ctx.scale(1.6, 1.6);
  ctx.translate(10, 8);

  const wheelY = JH - 6;
  const wheelR = 14;

  // Chunky knobby tyres
  [17, JW - 17].forEach(wx => {
    // Tread blocks (dark outer ring)
    ctx.fillStyle = "#161616";
    ctx.beginPath(); ctx.arc(wx, wheelY, wheelR, 0, Math.PI * 2); ctx.fill();
    // Tread lugs
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4;
      ctx.save();
      ctx.translate(wx, wheelY);
      ctx.rotate(a);
      ctx.fillStyle = "#2a2a2a";
      ctx.fillRect(-2.5, wheelR - 5, 5, 5);
      ctx.restore();
    }
    // Inner tyre
    ctx.fillStyle = "#1e1e1e";
    ctx.beginPath(); ctx.arc(wx, wheelY, wheelR - 5, 0, Math.PI * 2); ctx.fill();
    // Rim (5-spoke)
    ctx.strokeStyle = "#999"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(wx, wheelY, wheelR - 5, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "#777";
    ctx.beginPath(); ctx.arc(wx, wheelY, 3.5, 0, Math.PI * 2); ctx.fill();
    for (let i = 0; i < 5; i++) {
      const a = i * Math.PI * 2 / 5;
      ctx.strokeStyle = "#aaa"; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(wx + Math.cos(a) * 3.5, wheelY + Math.sin(a) * 3.5);
      ctx.lineTo(wx + Math.cos(a) * (wheelR - 6), wheelY + Math.sin(a) * (wheelR - 6));
      ctx.stroke();
    }
    // Centre hub
    ctx.fillStyle = "#555";
    ctx.beginPath(); ctx.arc(wx, wheelY, 2, 0, Math.PI * 2); ctx.fill();
  });

  // Rear-mounted spare tyre — vertical rectangle with rounded corners
  const sx = 1, sy = JH - 40, sw = 10, sh = 20, sr = 3;
  ctx.fillStyle = "#1a1a1a";
  ctx.beginPath();
  ctx.moveTo(sx + sr, sy);
  ctx.lineTo(sx + sw - sr, sy);
  ctx.arcTo(sx + sw, sy, sx + sw, sy + sr, sr);
  ctx.lineTo(sx + sw, sy + sh - sr);
  ctx.arcTo(sx + sw, sy + sh, sx + sw - sr, sy + sh, sr);
  ctx.lineTo(sx + sr, sy + sh);
  ctx.arcTo(sx, sy + sh, sx, sy + sh - sr, sr);
  ctx.lineTo(sx, sy + sr);
  ctx.arcTo(sx, sy, sx + sr, sy, sr);
  ctx.closePath();
  ctx.fill();

  // Lower body / rocker rail (sill between wheels)
  ctx.fillStyle = "#2e3e1a";
  ctx.fillRect(22, JH - 16, JW - 44, 6);

  // Main body — boxy, same width top to bottom (Wrangler key trait)
  ctx.fillStyle = "#4e6a2c";
  ctx.fillRect(8, JH - 30, JW - 16, 18);

  // Cab — same width as body (no taper)
  ctx.fillStyle = "#445f28";
  ctx.fillRect(8, JH - 46, JW - 16, 20);

  // Exposed roll bar (U-shape over open cab)
  ctx.strokeStyle = "#2a3d18"; ctx.lineWidth = 3;
  ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(16, JH - 28);
  ctx.lineTo(16, JH - 46);
  ctx.lineTo(JW - 24, JH - 46);
  ctx.lineTo(JW - 24, JH - 28);
  ctx.stroke();

  // Windshield — tall & nearly vertical (Wrangler style)
  ctx.fillStyle = "rgba(160, 220, 255, 0.35)";
  ctx.fillRect(JW - 28, JH - 44, 14, 18);
  ctx.strokeStyle = "#3a5020"; ctx.lineWidth = 1;
  ctx.strokeRect(JW - 28, JH - 44, 14, 18);

  // Front face panel (right side of vehicle)
  ctx.fillStyle = "#344822";
  ctx.fillRect(JW - 10, JH - 30, 10, 16);

  // 7-slot grille (iconic Jeep trademark)
  ctx.fillStyle = "#1e2e10";
  for (let i = 0; i < 7; i++) {
    ctx.fillRect(JW - 9, JH - 27 + i * 2.2, 7, 1.2);
  }

  // Round headlight
  ctx.fillStyle = "#ffe866";
  ctx.beginPath(); ctx.arc(JW - 7, JH - 35, 4, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#bbb"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(JW - 7, JH - 35, 4, 0, Math.PI * 2); ctx.stroke();
  // Lens glint
  ctx.fillStyle = "#fffde0";
  ctx.beginPath(); ctx.arc(JW - 8.5, JH - 36.5, 1.5, 0, Math.PI * 2); ctx.fill();

  // Flat hood (short front overhang above grille)
  ctx.fillStyle = "#4e6a2c";
  ctx.fillRect(JW - 12, JH - 32, 6, 4);

})();

// ── Reference Wrangler (red hard top) ────────────────────────────────────────
(function () {
  const ctx = document.getElementById("reference").getContext("2d");
  ctx.scale(1.6, 1.6);
  ctx.translate(12, 8);

  const wheelY = JH - 6;
  const wheelR = 14;

  // Chunky knobby tyres
  [17, JW - 17].forEach(wx => {
    ctx.fillStyle = "#161616";
    ctx.beginPath(); ctx.arc(wx, wheelY, wheelR, 0, Math.PI * 2); ctx.fill();
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4;
      ctx.save(); ctx.translate(wx, wheelY); ctx.rotate(a);
      ctx.fillStyle = "#2a2a2a";
      ctx.fillRect(-2.5, wheelR - 5, 5, 5);
      ctx.restore();
    }
    ctx.fillStyle = "#1e1e1e";
    ctx.beginPath(); ctx.arc(wx, wheelY, wheelR - 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#999"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(wx, wheelY, wheelR - 5, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "#777";
    ctx.beginPath(); ctx.arc(wx, wheelY, 3.5, 0, Math.PI * 2); ctx.fill();
    for (let i = 0; i < 5; i++) {
      const a = i * Math.PI * 2 / 5;
      ctx.strokeStyle = "#aaa"; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(wx + Math.cos(a) * 3.5, wheelY + Math.sin(a) * 3.5);
      ctx.lineTo(wx + Math.cos(a) * (wheelR - 6), wheelY + Math.sin(a) * (wheelR - 6));
      ctx.stroke();
    }
    ctx.fillStyle = "#555";
    ctx.beginPath(); ctx.arc(wx, wheelY, 2, 0, Math.PI * 2); ctx.fill();
  });

  // Spare tyre — circular side profile on rear
  const spareX = 4, spareY = JH - 21, spareR = 11;
  ctx.fillStyle = "#161616";
  ctx.beginPath(); ctx.arc(spareX, spareY, spareR, 0, Math.PI * 2); ctx.fill();
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4;
    ctx.save(); ctx.translate(spareX, spareY); ctx.rotate(a);
    ctx.fillStyle = "#2a2a2a";
    ctx.fillRect(-2, spareR - 4, 4, 4);
    ctx.restore();
  }
  ctx.fillStyle = "#1e1e1e";
  ctx.beginPath(); ctx.arc(spareX, spareY, spareR - 4, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#888"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(spareX, spareY, spareR - 4, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = "#555";
  ctx.beginPath(); ctx.arc(spareX, spareY, 2.5, 0, Math.PI * 2); ctx.fill();

  // Wheel arch flares (black, pronounced — key Wrangler detail)
  ctx.fillStyle = "#1a1a1a";
  [17, JW - 17].forEach(wx => {
    ctx.beginPath();
    ctx.arc(wx, wheelY - 2, wheelR + 3, Math.PI, 0);
    ctx.closePath();
    ctx.fill();
  });

  // Main body — red, boxy
  ctx.fillStyle = "#cc2020";
  ctx.fillRect(8, JH - 32, JW - 16, 20);

  // Hard top roof — near black
  ctx.fillStyle = "#1e1e1e";
  ctx.fillRect(8, JH - 46, JW - 16, 16);

  // Roof / body trim divider
  ctx.strokeStyle = "#111"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(8, JH - 32); ctx.lineTo(JW - 8, JH - 32); ctx.stroke();

  // Large windshield — prominent blue tint
  ctx.fillStyle = "rgba(80, 150, 210, 0.6)";
  ctx.fillRect(JW - 30, JH - 44, 18, 20);
  ctx.strokeStyle = "#111"; ctx.lineWidth = 1;
  ctx.strokeRect(JW - 30, JH - 44, 18, 20);

  // Front bumper / face
  ctx.fillStyle = "#1e1e1e";
  ctx.fillRect(JW - 10, JH - 30, 10, 16);

  // 7-slot grille
  ctx.fillStyle = "#0a0a0a";
  for (let i = 0; i < 7; i++) {
    ctx.fillRect(JW - 9, JH - 27 + i * 2.1, 7, 1.2);
  }

  // Round headlight (sits above grille)
  ctx.fillStyle = "#ffe866";
  ctx.beginPath(); ctx.arc(JW - 7, JH - 35, 4, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#555"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(JW - 7, JH - 35, 4, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = "#fffde0";
  ctx.beginPath(); ctx.arc(JW - 8.5, JH - 36.5, 1.5, 0, Math.PI * 2); ctx.fill();

  // Hood — red, flat, short overhang
  ctx.fillStyle = "#cc2020";
  ctx.fillRect(JW - 14, JH - 32, 8, 5);

  // Rock rail / side step
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(24, JH - 14, JW - 46, 4);
})();
</script>
</body>
</html>
